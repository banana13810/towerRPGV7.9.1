<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG Ver8.0</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
}

.game{
max-width:480px;
margin:auto;
padding:10px;
}

.bar{
width:100%;
height:20px;
background:#333;
border-radius:10px;
margin:5px 0;
}

.hpbar{
height:20px;
background:red;
border-radius:10px;
}

.enemybar{
height:15px;
background:lime;
border-radius:10px;
}

button{
margin:3px;
padding:10px;
font-size:16px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="game">

<h2>🏯塔RPG Ver8.0</h2>

<h3 id="enemy"></h3>

<div class="bar">
<div id="enemybar" class="enemybar"></div>
</div>

<div id="enemyHP"></div>

<hr>

<div>階層 <span id="floor"></span></div>

<div class="bar">
<div id="hpbar" class="hpbar"></div>
</div>

<div>HP <span id="hp"></span></div>
<div>MP <span id="mp"></span></div>

<div>Lv <span id="level"></span></div>
<div>EXP <span id="exp"></span></div>

<div>💰 <span id="gold"></span></div>

<button id="attackBtn">⚔攻撃</button>
<button id="autoBtn">🔴オート戦闘OFF</button>
<button onclick="next()">⬆次の階</button>

<br><br>

<label>オート優先スキル
<select id="prioritySkill">
<option value="0">🔥ファイア</option>
<option value="1">💧アイス</option>
<option value="2">⚡サンダー</option>
<option value="3">💖ヒール</option>
<option value="4">🛡バリア</option>
</select>
</label>

<div id="skills"></div>

<hr>

<div id="log"></div>

</div>

<script>

/* 基本 */

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMP=50
let playerMaxMP=50

let attack=5
let defense=2

let gold=0

let enemy=""
let enemyHP=0
let enemyMax=0

let auto=false
let nextFloor=false
let prioritySkill=2

let logHistory=[]

/* ログ */

function log(t){

logHistory.unshift(t)

if(logHistory.length>6)logHistory.pop()

document.getElementById("log").innerHTML=logHistory.join("<br>")

}

/* 敵生成 */

function spawnEnemy(){

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

enemyMax=20+floor*5
enemyHP=enemyMax

if(floor%10==0){
enemy="🐉ボス"
enemyMax=200+floor*10
enemyHP=enemyMax
}

document.getElementById("enemy").innerText=enemy

}

/* 攻撃 */

function playerAttack(){

if(enemyHP<=0)return

let dmg=attack

if(Math.random()<0.15){

dmg*=2
log("⚡クリティカル")

}

enemyHP-=dmg

log("⚔ "+dmg+"ダメージ")

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

if(enemyHP<=0){

gold+=10+floor
exp+=5

log("敵撃破")

nextFloor=true

}

enemyAttack()

update()

}

/* 敵攻撃 */

function enemyAttack(){

if(enemyHP<=0)return

let dmg=5+floor-defense

if(dmg<1)dmg=1

playerHP-=dmg

log("敵攻撃 "+dmg)

if(playerHP<=0){

alert("ゲームオーバー")

location.reload()

}

}

/* レベルアップ */

function levelUp(){

if(exp>=expMax){

exp-=expMax

level++

expMax=Math.floor(expMax*1.4)

playerMax+=20
playerMaxMP+=10
attack+=2
defense+=1

playerHP=playerMax
playerMP=playerMaxMP

log("✨レベルアップ Lv"+level)

}

}

/* スキル */

let skills=[

{
name:"🔥ファイア",
cost:20,
action(){

if(playerMP<20)return

playerMP-=20

enemyHP-=attack*3

log("🔥ファイア")

}

},

{
name:"💧アイス",
cost:15,
action(){

if(playerMP<15)return

playerMP-=15

enemyHP-=attack*1.5

log("💧アイス")

}

},

{
name:"⚡サンダー",
cost:25,
action(){

if(playerMP<25)return

playerMP-=25

enemyHP-=attack*2

log("⚡サンダー")

}

},

{
name:"💖ヒール",
cost:15,
action(){

if(playerMP<15)return

playerMP-=15

playerHP+=30

if(playerHP>playerMax)playerHP=playerMax

log("💖回復")

}

},

{
name:"🛡バリア",
cost:20,
action(){

if(playerMP<20)return

playerMP-=20

defense+=5

setTimeout(()=>defense-=5,5000)

log("🛡防御UP")

}

}

]

/* スキル表示 */

function drawSkills(){

let html=""

skills.forEach((s,i)=>{

html+=`<button onclick="skills[${i}].action();enemyAttack();update();">${s.name}</button>`

})

document.getElementById("skills").innerHTML=html

}

/* 次階 */

function next(){

if(!nextFloor)return

floor++

nextFloor=false

spawnEnemy()

update()

}

/* オート */

function autoBattle(){

if(!auto)return

if(nextFloor){

next()

return

}

let skill=skills[prioritySkill]

if(playerMP>=skill.cost){

skill.action()

enemyAttack()

}else{

playerAttack()

}

update()

}

setInterval(autoBattle,1000)

/* UI */

document.getElementById("attackBtn").onclick=playerAttack

document.getElementById("autoBtn").onclick=function(){

auto=!auto

this.innerText=auto?"🟢オート戦闘ON":"🔴オート戦闘OFF"

}

document.getElementById("prioritySkill").onchange=function(){

prioritySkill=parseInt(this.value)

}

/* 更新 */

function update(){

levelUp()

document.getElementById("floor").innerText=floor

document.getElementById("hp").innerText=playerHP+"/"+playerMax

document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP

document.getElementById("level").innerText=level

document.getElementById("exp").innerText=exp+"/"+expMax

document.getElementById("gold").innerText=gold

document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"

document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

}

/* 開始 */

spawnEnemy()

drawSkills()

update()

</script>
</body>
</html>
